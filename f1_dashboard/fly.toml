app = "f1-kalshi-trading"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  DRY_RUN = "true"
  DB_PATH = "/app/data/f1trading.db"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "f1_data"
  destination = "/app/data"

[checks]
  [checks.health]
    type = "http"
    port = 8000
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
